<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#060C1A"/>
  <!-- Subtle radial glow left -->
  <radialGradient id="glowL" cx="25%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#4F8EF7" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#060C1A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <!-- Subtle radial glow right -->
  <radialGradient id="glowR" cx="80%" cy="30%" r="40%">
    <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#060C1A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glowR)"/>

  <!-- Logo image placeholder — replace with actual logo via image embedding -->
  <!-- Logo zone: centered, 480×260 -->
  <image href="blackstorm-logo.png" x="360" y="120" width="480" height="260"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Fallback text if image not embedded -->
  <!-- Tagline -->
  <text x="600" y="440"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="600" letter-spacing="6"
        fill="#64748B" text-anchor="middle" dominant-baseline="middle">
    NETWORK MONITORING &amp; SECURITY SERVICES
  </text>

  <!-- Bottom rule + URL -->
  <line x1="200" y1="530" x2="1000" y2="530" stroke="#162E4D" stroke-width="1"/>
  <text x="600" y="570"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="500" letter-spacing="2"
        fill="#4F8EF7" text-anchor="middle" dominant-baseline="middle">
    blackstormllc.com
  </text>
</svg>
